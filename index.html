<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Young Life — Sacramento County Ministry Map</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <!-- App styles -->
  <link rel="stylesheet" href="styles.css?v=8">

  <style>
    html, body { height: 100%; display: flex; flex-direction: column; }
  </style>
</head>
<body>

<!-- ── HEADER ──────────────────────────────────────────────────────────── -->
<header id="header">

  <div class="brand">
    <div class="yl-badge">YL</div>
    <div class="brand-text">
      <span class="brand-name">Young Life</span>
      <span class="brand-sub">Sacramento County</span>
    </div>
  </div>

  <div class="divider"></div>

  <!-- Search -->
  <div class="search-wrap">
    <svg class="search-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="9" cy="9" r="6"/><path d="M15 15l3 3"/>
    </svg>
    <input type="text" id="searchInput" placeholder="Search schools…" autocomplete="off">
    <button id="searchClear" class="search-clear" title="Clear">&times;</button>
  </div>

  <div class="divider"></div>

  <!-- Filter buttons -->
  <div class="filters" id="filterGroup">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn"        data-filter="existing">Existing</button>
    <button class="filter-btn"        data-filter="target">Target</button>
  </div>

  <!-- Boundary zones toggle -->
  <button id="boundaryBtn" class="boundary-btn">School Zones</button>

  <!-- Compare button -->
  <button id="compareBtn" disabled>Compare</button>

  <!-- Sheets sync indicator -->
  <div id="syncStatus" class="sync-status hidden" title="Live sync from Google Sheets">
    <span class="sync-dot"></span> Live
  </div>

  <!-- Live summary stats -->
  <div class="header-stats">
    <div class="hstat">
      <span class="n" id="statExisting">—</span>
      <span class="l">Active</span>
    </div>
    <div class="hstat">
      <span class="n" id="statTarget">—</span>
      <span class="l">Target</span>
    </div>
  </div>

  <!-- Legend -->
  <div class="legend">
    <div class="leg-item">
      <div class="leg-dot existing"></div>
      <span>Existing</span>
    </div>
    <div class="leg-item">
      <div class="leg-dot target"></div>
      <span>Target</span>
    </div>
  </div>

</header>

<!-- ── REACH COUNTER BAR ────────────────────────────────────────────────── -->
<div id="reachBar">
  <span class="reach-existing">
    <strong id="reachExistingCount">—</strong> active schools ·
    <strong id="reachExistingStudents">—</strong> students currently reached
  </span>
  <span class="reach-sep">→</span>
  <span class="reach-target">
    launch all <strong id="reachTargetCount">—</strong> targets ·
    <strong id="reachTargetStudents">—</strong> additional students
  </span>
</div>

<!-- ── MAP + OVERLAYS ──────────────────────────────────────────────────── -->
<div id="map-wrap">

  <!-- Leaflet map -->
  <div id="map"></div>

  <!-- ── SIDEBAR ─────────────────────────────────────────────────────── -->
  <div id="sidebar">
    <div class="sidebar-actions">
      <button id="printBtn" class="sidebar-action-btn" title="Print school card">
        <svg viewBox="0 0 20 20" fill="currentColor" width="14" height="14"><path d="M5 4v3H4a2 2 0 00-2 2v5a2 2 0 002 2h1v2a1 1 0 001 1h8a1 1 0 001-1v-2h1a2 2 0 002-2V9a2 2 0 00-2-2h-1V4a1 1 0 00-1-1H6a1 1 0 00-1 1zm2 0h6v3H7V4zm-1 9h8v4H6v-4zm8-4a1 1 0 110 2 1 1 0 010-2z"/></svg>
        Print
      </button>
      <button id="sidebarClose" title="Close">&times;</button>
    </div>
    <div id="sidebarContent"></div>
  </div>

  <!-- ── COMPARE PANEL ───────────────────────────────────────────────── -->
  <div id="comparePanel">
    <div class="cmp-header">
      <h2>School Comparison</h2>
      <div class="cmp-header-btns">
        <button class="cmp-clear-btn" id="cmpClearBtn">Clear All</button>
        <button class="cmp-close-btn" id="cmpCloseBtn">&times; Close</button>
      </div>
    </div>
    <div class="cmp-body" id="cmpBody">
      <p style="color:#9ca3af;font-size:13px;padding:4px">
        Add at least 2 schools from the sidebar to compare.
      </p>
    </div>
  </div>

</div>

<!-- ── HOVER TOOLTIP ───────────────────────────────────────────────────── -->
<div id="tooltip"></div>

<!-- ── PRINT STYLES ─────────────────────────────────────────────────────── -->
<style>
@media print {
  #header, #reachBar, #map-wrap > #map, #comparePanel, #tooltip,
  .sidebar-actions, .add-cmp-btn, .data-note { display: none !important; }
  body, html { height: auto; overflow: visible; }
  #map-wrap { display: block; height: auto; }
  #sidebar {
    position: static !important; transform: none !important;
    width: 100% !important; height: auto !important;
    box-shadow: none !important; overflow: visible !important;
  }
  .section { break-inside: avoid; }
}
</style>

<!-- ── SCRIPTS ─────────────────────────────────────────────────────────── -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="config.js?v=8"></script>
<script src="data.js?v=8"></script>
<script src="app.js?v=8"></script>

</body>
</html>
